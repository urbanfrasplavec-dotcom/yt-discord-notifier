name: Check YouTube Uploads

on:
  schedule:
    # Runs every 15 minutes. GitHub may delay this slightly during high load.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you manually trigger a run from the Actions tab

permissions:
  contents: write # needed so the workflow can commit the updated seen.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run upload checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python check_uploads.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "Update seen.json [skip ci]"
          git push
